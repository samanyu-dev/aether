[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aether-observe"
version = "0.1.0b1"
description = "Local-first realtime cognition debugger for AI agents."
readme = "README.md"
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests>=2.25.0",
    "websocket-client>=1.0.0"
]

[project.scripts]
aether = "aether.cli:main"

[project.urls]
Homepage = "https://github.com/Samanyu-dev/Aether"
Documentation = "https://github.com/Samanyu-dev/Aether#readme"
"Bug Tracker" = "https://github.com/Samanyu-dev/Aether/issues"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["aether*"]
